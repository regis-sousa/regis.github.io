<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>regiss.me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js'></script>

    <!-- Hora atual -->
    <div id="hora-garfield"></div>

    <!-- Contador de segundas -->
    <div id="contador-segundas">
        <span id="num-segundas">0</span>
        <span id="label-segundas">segundas odiadas</span>
    </div>

    <!-- Redes sociais -->
    <div id="redes-sociais">
        <a href="https://instagram.com/regiss.me" target="_blank" class="rede-link" title="@regiss.me">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        </a>
        <a href="https://open.spotify.com/user/tpnafc14jlu52tv13awuftc0w" target="_blank" class="rede-link" title="Spotify">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </a>
    </div>

    <!-- Dica do nariz -->
    <div id="dica-nariz">👆 toca no meu nariz</div>

    <!-- Balão de fala -->
    <div id="balao-fala" class="escondido">
        <span id="texto-balao"></span>
        <div class="rabo-balao"></div>
    </div>

    <!-- Garfield -->
    <div class="garfield">
        <div class="garfield-inner">
            <div class="face">

                <div id="triangle-right">
                    <div class="triangle1"></div>
                    <div class="triangle2"></div>
                    <div class="triangle3"></div>
                </div>

                <div id="triangle-left">
                    <div class="triangle1"></div>
                    <div class="triangle2"></div>
                    <div class="triangle3"></div>
                </div>

                <div class="whisker1">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker2">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker3">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker4">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                </div>
                <div class="whisker5">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker6">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker7">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker8">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                </div>

                <div id="eyes">
                    <div class="eye left"><div class="eyeball1"></div></div>
                    <div class="eye right"><div class="eyeball2"></div></div>
                </div>

                <div class="nose" id="nariz"></div>
                <div class="mouth"></div>
                <div class="snout1"></div>
                <div class="snout1small"><div class="whisker left"></div></div>
                <div class="snout2"></div>
                <div class="snout2small"><div class="whisker right"></div></div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
