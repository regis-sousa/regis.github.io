<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>regiss.me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js'></script>

    <!-- Cursor personalizado -->
    <div id="cursor-pata"></div>

    <!-- Hora atual -->
    <div id="hora-garfield"><span id="relogio-emoji">🕐</span><span id="hora-texto"></span></div>

    <!-- Popup WhatsApp (easter egg) -->
    <div id="wpp-overlay" class="escondido"></div>
    <div id="wpp-popup" class="escondido">
        <button id="fechar-wpp">✕</button>
        <p id="wpp-label">mande um oi 👋</p>
        <a href="http://wa.me/5585963154756" target="_blank" id="btn-wpp">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            abrir whatsapp
        </a>
    </div>

    <!-- Contador de segundas -->
    <div id="contador-segundas">
        <span id="num-segundas">0</span>
        <span id="label-segundas">segundas odiadas</span>
    </div>

    <!-- Redes sociais -->
    <div id="redes-sociais">
        <a href="https://instagram.com/regiss.me" target="_blank" class="rede-link" title="@regiss.me">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
        </a>
        <button id="btn-spotify" class="rede-link" title="Spotify">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </button>
        <button id="btn-velha" class="rede-link" title="Jogo da Velha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="2" y1="16" x2="22" y2="16"/></svg>
        </button>
        <button id="btn-snake" class="rede-link" title="Snake">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h4v4H3zm0 7h4v4H3zm7-7h4v4h-4zm7 7h4v4h-4zm0 7h4v4h-4zm-7 0h4v4h-4zm7-14h4v4h-4zM3 17h4v4H3z"/><path d="M7 5h3M10 5v3M17 10h-3M14 10v3M10 14v3M10 17h7M17 17v-4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
    </div>

    <!-- Popup Spotify -->
    <div id="spotify-overlay" class="escondido"></div>
    <div id="spotify-popup" class="escondido">
        <button id="fechar-popup">✕</button>
        <p id="popup-label">o que tô ouvindo</p>
        <img id="spotify-img" src="" alt="Spotify Now Playing">
        <a href="https://open.spotify.com/user/tpnafc14jlu52tv13awuftc0w" target="_blank" id="btn-perfil-spotify">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            ver meu perfil
        </a>
    </div>

    <!-- Dica do nariz -->
    <div id="dica-nariz">👆 toca no meu nariz</div>

    <!-- Balão de fala -->
    <div id="balao-fala" class="escondido">
        <span id="texto-balao"></span>
        <div class="rabo-balao"></div>
    </div>

    <!-- Garfield -->
    <div class="garfield">
        <div class="garfield-inner">
            <div class="face">

                <div id="triangle-right">
                    <div class="triangle1"></div>
                    <div class="triangle2"></div>
                    <div class="triangle3"></div>
                </div>

                <div id="triangle-left">
                    <div class="triangle1"></div>
                    <div class="triangle2"></div>
                    <div class="triangle3"></div>
                </div>

                <div class="whisker1">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker2">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker3">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker4">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                </div>
                <div class="whisker5">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker6">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker7">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                    <div class="stripes4"><div class="stripeD"></div><div class="stripe4"></div></div>
                </div>
                <div class="whisker8">
                    <div class="stripes1"><div class="stripeA"></div><div class="stripe1"></div></div>
                    <div class="stripes2"><div class="stripeB"></div><div class="stripe2"></div></div>
                    <div class="stripes3"><div class="stripeC"></div><div class="stripe3"></div></div>
                </div>

                <div id="eyes">
                    <div class="eye left"><div class="eyeball1"></div></div>
                    <div class="eye right"><div class="eyeball2"></div></div>
                </div>

                <div class="nose" id="nariz"></div>
                <div class="mouth"></div>
                <div class="snout1"></div>
                <div class="snout1small"><div class="whisker left"></div></div>
                <div class="snout2"></div>
                <div class="snout2small"><div class="whisker right"></div></div>

            </div>
        </div>
    </div>

    <!-- Popup Jogo da Velha -->
    <div id="velha-overlay" class="escondido"></div>
    <div id="velha-popup" class="escondido">
        <button class="fechar-popup-btn" id="fechar-velha">✕</button>
        <p class="popup-label-jogo">jogo da velha</p>
        <p id="velha-status">sua vez — você é o ✕</p>
        <div id="velha-board">
            <div class="velha-cell" data-i="0"></div>
            <div class="velha-cell" data-i="1"></div>
            <div class="velha-cell" data-i="2"></div>
            <div class="velha-cell" data-i="3"></div>
            <div class="velha-cell" data-i="4"></div>
            <div class="velha-cell" data-i="5"></div>
            <div class="velha-cell" data-i="6"></div>
            <div class="velha-cell" data-i="7"></div>
            <div class="velha-cell" data-i="8"></div>
        </div>
        <button id="velha-reiniciar">jogar de novo</button>
    </div>

    <!-- Popup Snake -->
    <div id="snake-overlay" class="escondido"></div>
    <div id="snake-popup" class="escondido">
        <button class="fechar-popup-btn" id="fechar-snake">✕</button>
        <p class="popup-label-jogo">snake</p>
        <p id="snake-score">pontos: 0</p>
        <canvas id="snake-canvas" width="280" height="280"></canvas>
        <div id="snake-controles">
            <button class="snake-btn" id="snake-up">▲</button>
            <div id="snake-meio">
                <button class="snake-btn" id="snake-left">◀</button>
                <button class="snake-btn" id="snake-right">▶</button>
            </div>
            <button class="snake-btn" id="snake-down">▼</button>
        </div>
        <p id="snake-msg">pressione uma tecla ou botão pra começar</p>
    </div>

    <!-- Odie Easter Egg — SVG ilustrado -->
    <div id="odie" class="escondido">
        <svg width="110" height="100" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Corpo -->
            <ellipse cx="55" cy="72" rx="28" ry="20" fill="#d4a843" stroke="#1a0a00" stroke-width="2.5"/>
            <!-- Patas traseiras -->
            <ellipse cx="34" cy="88" rx="12" ry="8" fill="#c49030" stroke="#1a0a00" stroke-width="2"/>
            <ellipse cx="76" cy="88" rx="12" ry="8" fill="#c49030" stroke="#1a0a00" stroke-width="2"/>
            <!-- Patas frente -->
            <ellipse cx="38" cy="82" rx="10" ry="6" fill="#d4a843" stroke="#1a0a00" stroke-width="2" class="pata-ani pata-a"/>
            <ellipse cx="72" cy="82" rx="10" ry="6" fill="#d4a843" stroke="#1a0a00" stroke-width="2" class="pata-ani pata-b"/>
            <!-- Rabo -->
            <path d="M83 65 Q100 55 95 42 Q90 30 98 25" fill="none" stroke="#d4a843" stroke-width="5" stroke-linecap="round" class="rabo-odie"/>
            <!-- Pescoço -->
            <ellipse cx="55" cy="57" rx="16" ry="10" fill="#d4a843" stroke="#1a0a00" stroke-width="2"/>
            <!-- Cabeça -->
            <ellipse cx="55" cy="38" rx="30" ry="26" fill="#d4a843" stroke="#1a0a00" stroke-width="2.5"/>
            <!-- Orelhas -->
            <ellipse cx="22" cy="22" rx="10" ry="16" fill="#c49030" stroke="#1a0a00" stroke-width="2" transform="rotate(-15 22 22)"/>
            <ellipse cx="88" cy="22" rx="10" ry="16" fill="#c49030" stroke="#1a0a00" stroke-width="2" transform="rotate(15 88 22)"/>
            <!-- Focinho branco -->
            <ellipse cx="55" cy="46" rx="18" ry="13" fill="#f5e6b0" stroke="#1a0a00" stroke-width="1.5"/>
            <!-- Olhos brancos -->
            <ellipse cx="42" cy="33" rx="10" ry="11" fill="white" stroke="#1a0a00" stroke-width="2"/>
            <ellipse cx="68" cy="33" rx="10" ry="11" fill="white" stroke="#1a0a00" stroke-width="2"/>
            <!-- Pupilas -->
            <ellipse cx="44" cy="36" rx="5" ry="6" fill="#1a1a1a"/>
            <ellipse cx="70" cy="36" rx="5" ry="6" fill="#1a1a1a"/>
            <!-- Brilho olhos -->
            <circle cx="46" cy="33" r="2" fill="white"/>
            <circle cx="72" cy="33" r="2" fill="white"/>
            <!-- Nariz -->
            <ellipse cx="55" cy="44" rx="6" ry="4" fill="#c06060" stroke="#1a0a00" stroke-width="1.5"/>
            <!-- Língua -->
            <path d="M48 52 Q55 62 62 52" fill="#e07080" stroke="#1a0a00" stroke-width="1.5"/>
            <ellipse cx="55" cy="57" rx="7" ry="5" fill="#e07080" stroke="#1a0a00" stroke-width="1.5" class="lingua-odie"/>
            <!-- Linha boca -->
            <path d="M49 49 Q55 53 61 49" fill="none" stroke="#1a0a00" stroke-width="1.5"/>
            <!-- Linhas focinho -->
            <line x1="37" y1="46" x2="48" y2="48" stroke="#1a0a00" stroke-width="1" opacity="0.4"/>
            <line x1="37" y1="50" x2="48" y2="50" stroke="#1a0a00" stroke-width="1" opacity="0.4"/>
            <line x1="73" y1="46" x2="62" y2="48" stroke="#1a0a00" stroke-width="1" opacity="0.4"/>
            <line x1="73" y1="50" x2="62" y2="50" stroke="#1a0a00" stroke-width="1" opacity="0.4"/>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
