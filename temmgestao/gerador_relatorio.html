<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Relatório — Temm Gestão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#1A56FF; --teal:#00C9A7; --yellow:#D4C200;
    --dark:#0F1117; --card:#1C2033; --border:#2A2F45;
    --text:#E8EAF0; --muted:#7B82A0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:'Sora',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

  .app-header{background:var(--blue);padding:15px 30px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--teal);}
  .app-header img{height:36px;}
  .app-header h1{font-size:1rem;font-weight:700;color:#fff;}
  .app-header p{font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:2px;}
  .logo-link{display:flex;align-items:center;text-decoration:none;}
  .back-btn{margin-left:auto;padding:6px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:0.76rem;font-weight:600;text-decoration:none;white-space:nowrap;}
  .back-btn:hover{background:rgba(255,255,255,0.2);}

  .container{max-width:960px;margin:0 auto;padding:26px 18px 60px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 26px;margin-bottom:16px;}
  .card-label{font-size:0.63rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
  .card-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;}

  label{display:block;font-size:0.77rem;color:var(--muted);margin-bottom:5px;font-weight:600;}
  input[type="text"],input[type="date"]{width:100%;background:#12151F;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Sora',sans-serif;font-size:0.84rem;outline:none;transition:border-color .2s;}
  input:focus{border-color:var(--blue);}

  .g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;}

  .tg{display:flex;gap:8px;flex-wrap:wrap;}
  .tb{padding:8px 17px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:0.79rem;font-weight:600;cursor:pointer;transition:all .2s;}
  .tb.on{border-color:var(--blue);background:rgba(26,86,255,0.14);color:#6fa3ff;}

  .upload-zone{border:2px dashed var(--border);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:rgba(26,86,255,0.05);}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .uicon{font-size:1.9rem;margin-bottom:7px;}
  .upload-zone p{color:var(--muted);font-size:0.81rem;}
  .upload-zone strong{color:var(--text);}
  .uok{color:var(--teal);font-weight:600;font-size:0.83rem;margin-top:7px;}
  .uerr{color:#f87171;font-weight:600;font-size:0.83rem;margin-top:7px;}

  .infobox{background:rgba(0,201,167,0.07);border:1px solid rgba(0,201,167,0.22);border-radius:8px;padding:10px 13px;font-size:0.79rem;color:var(--teal);margin-top:11px;display:none;}

  .btn-gen{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:0.91rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:0.02em;}
  .btn-gen:hover{opacity:.88;}
  .btn-gen:active{transform:scale(.98);}
  .btn-gen:disabled{opacity:.32;cursor:not-allowed;}

  #preview-section{display:none;}
  .preview-wrap{background:#d0d4de;border-radius:10px;padding:18px;overflow:auto;max-height:82vh;}

  /* REPORT */
  .rpt{background:#fff;color:#1A1A2E;font-family:'Sora',sans-serif;width:277mm;margin:0 auto;box-shadow:0 4px 32px rgba(0,0,0,.22);}
  .rpt.portrait{width:210mm;}

  .rpt-head{background:#1A56FF;padding:9mm 11mm;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #00C9A7;}
  .rpt-head img{height:18mm;display:block;}
  .rpt-hr{text-align:right;color:#fff;}
  .rpt-hr h1{font-size:1.2rem;font-weight:700;}
  .rpt-hr .cli{font-size:0.79rem;color:#fff;margin-top:3px;font-weight:400;}
  .rpt-hr .per{font-size:0.72rem;color:rgba(255,255,255,0.92);margin-top:4px;}

  .rpt-body{padding:5mm 11mm 14mm;font-size:8pt;}

  .rpt-sec{margin-bottom:5mm;}
  .rpt-bar{background:#1A1A2E;color:#fff;padding:4px 9px;border-radius:5px 5px 0 0;font-size:0.69rem;font-weight:700;letter-spacing:0.04em;display:flex;align-items:center;gap:6px;}
  .rpt-bar::before{content:'';width:6px;height:6px;border-radius:50%;background:#00C9A7;flex-shrink:0;}

  .rpt-tbl{width:100%;border-collapse:collapse;}
  .rpt-tbl th{background:#F1F3FA;padding:4px 6px;text-align:left;font-size:0.65rem;font-weight:700;color:#6B7280;letter-spacing:0.05em;text-transform:uppercase;border-bottom:1.5px solid #E5E7EB;}
  .rpt-tbl th.r{text-align:right;}
  .rpt-tbl td{padding:4px 6px;font-size:0.74rem;border-bottom:0.5px solid #E5E7EB;vertical-align:top;}
  .rpt-tbl td.r{text-align:right;}
  .rpt-tbl td.obs{font-size:0.66rem;color:#6B7280;font-style:italic;}
  .rpt-tbl tr:last-child td{border-bottom:none;}
  .er{background:#F8F9FC;}
  .gn{color:#059669;font-weight:600;}
  .rd{color:#dc2626;font-weight:600;}
  .ds{color:#9CA3AF;}

  .obs-inp{width:100%;background:#F4F5F8;border:1px solid #E5E7EB;border-radius:4px;padding:2px 5px;font-family:'Sora',sans-serif;font-size:0.67rem;color:#374151;outline:none;resize:none;}
  .obs-inp:focus{border-color:#1A56FF;}

  .rpt-obs{margin-top:5mm;}
  .rpt-obs-lbl{font-size:0.74rem;font-weight:700;color:#1A1A2E;margin-bottom:3mm;}
  .rpt-obs-area{width:100%;resize:vertical;font-family:'Sora',sans-serif;font-size:0.74rem;color:#374151;border:1.5px solid #D1D5DB;border-radius:6px;background:#F8F9FC;padding:6px 9px;outline:none;min-height:20mm;}
  .rpt-obs-area:focus{border-color:#1A56FF;}

  .rpt-foot{border-top:2px solid #D4C200;padding:3mm 11mm;font-size:0.63rem;color:#9CA3AF;text-align:center;}

  .pact{display:flex;gap:10px;margin-top:13px;}
  .bdl{flex:1;padding:12px;border-radius:9px;font-family:'Sora',sans-serif;font-weight:700;font-size:0.87rem;cursor:pointer;border:none;transition:opacity .2s;}
  .bdl:hover{opacity:.84;}
  .bp{background:var(--teal);color:#0F1117;}
  .bs{background:var(--border);color:var(--text);}
</style>
</head>

<script>
let WB = null, showSaldo = true, orient = 'landscape', obsGeral = '';
let pastRows = [], futRows = [];

// init date
const nd = new Date();
const p2 = n => String(n).padStart(2,'0');
document.getElementById('cdate').value = `${nd.getFullYear()}-${p2(nd.getMonth()+1)}-${p2(nd.getDate())}`;

function setSaldo(v){ showSaldo=v; document.getElementById('bss').classList.toggle('on',v); document.getElementById('bsn').classList.toggle('on',!v); }
function setOrient(v){ orient=v; document.getElementById('bla').classList.toggle('on',v==='landscape'); document.getElementById('bpo').classList.toggle('on',v==='portrait'); }

// Upload handlers
const zone = document.getElementById('zone');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave', ()=>zone.classList.remove('drag'));
zone.addEventListener('drop', e=>{e.preventDefault();zone.classList.remove('drag');readFile(e.dataTransfer.files[0]);});
document.getElementById('finput').addEventListener('change', e=>{ if(e.target.files[0]) readFile(e.target.files[0]); });

function readFile(file) {
  if (!file) return;
  showErr('');
  const reader = new FileReader();
  reader.onerror = () => showErr('Erro ao ler o arquivo.');
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true, dateNF: 'yyyy-mm-dd' });
      WB = parseWB(wb);
      document.getElementById('uicon').textContent = '✅';
      const total = WB.past.length + WB.future.length;
      showOk(`✓ ${file.name} — ${total} registro(s) carregado(s)`);
      showPeriod();
      const b = document.getElementById('bgen');
      b.disabled = false;
      b.textContent = '▶  Gerar Visualização';
    } catch(err) {
      showErr('Erro ao processar: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showOk(msg){ const el=document.getElementById('uok'); el.style.display='block'; el.textContent=msg; document.getElementById('uerr').style.display='none'; }
function showErr(msg){ if(!msg){document.getElementById('uerr').style.display='none';return;} const el=document.getElementById('uerr'); el.style.display='block'; el.textContent=msg; }

// Função auxiliar para parsear qualquer valor de data (Date, string ISO, número serial Excel)
function parseExcelDate(val) {
  if (!val && val !== 0) return null;

  // Já é um objeto Date válido
  if (val instanceof Date && !isNaN(val)) {
    return new Date(val.getFullYear(), val.getMonth(), val.getDate());
  }

  // String no formato YYYY-MM-DD (ou com hora depois)
  if (typeof val === 'string') {
    const m = val.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) {
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }
    // Tenta string com formato DD/MM/YYYY
    const m2 = val.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (m2) {
      return new Date(Number(m2[3]), Number(m2[2]) - 1, Number(m2[1]));
    }
  }

  // Número serial do Excel
  if (typeof val === 'number' && isFinite(val)) {
    // Excel conta a partir de 1 jan 1900; o número 60 seria 29 fev 1900 (bug do Lotus)
    const offset = val > 59 ? 25568 : 25567;
    const tmp = new Date((val - offset) * 86400000);
    return new Date(tmp.getFullYear(), tmp.getMonth(), tmp.getDate());
  }

  return null;
}

function parseWB(wb) {
  const out = { past:[], future:[] };
  wb.SheetNames.forEach(name => {
    const ws = wb.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:false, dateNF:'yyyy-mm-dd' });
    const isPast = name.toLowerCase().includes('pass');
    const arr = isPast ? out.past : out.future;

    rows.slice(1).forEach(row => {
      if (!row || !row[0]) return;

      // Coluna A = data de lançamento
      const dateVal = parseExcelDate(row[0]);
      if (!dateVal || isNaN(dateVal)) return;

      const nome = row[2] ? String(row[2]).trim() : '';
      const desc = row[3] ? String(row[3]).trim() : '';
      if (!nome && !desc) return;

      // ── CORREÇÃO PRINCIPAL ──
      // Coluna B = data de vencimento — mesmo parsing robusto
      const vencVal = parseExcelDate(row[1]);

      const parseNum = v => {
        if (v===null||v===undefined||v==='') return null;
        const n = Number(String(v).replace(/[^\d.\-]/g,''));
        return isNaN(n) ? null : n;
      };

      arr.push({
        date: dateVal,
        venc: vencVal,   // agora nunca fica null por falta de parsing
        nome,
        desc,
        entrada: parseNum(row[4]),
        saida:   parseNum(row[5]),
        saldo:   parseNum(row[6]),
        obs: ''
      });
    });
  });
  return out;
}

function showPeriod() {
  const all = [...WB.past,...WB.future].map(r=>r.date).filter(Boolean).sort((a,b)=>a-b);
  if (!all.length) return;
  const f = d => d.toLocaleDateString('pt-BR');
  const el = document.getElementById('infobox');
  el.style.display = 'block';
  el.innerHTML = `📅 Detectado na planilha: <strong>${f(all[0])}</strong> até <strong>${f(all[all.length-1])}</strong>`;
}

const fmtD = d => d && !isNaN(d) ? d.toLocaleDateString('pt-BR') : '—';
const fmtM = v => v===null||v===undefined ? '' : 'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

function getCfg() {
  const s = document.getElementById('cdate').value;
  const [cy,cm,cd] = s.split('-').map(Number);
  const center = new Date(cy,cm-1,cd);
  const before = parseInt(document.getElementById('dbefore').value)||7;
  const after  = parseInt(document.getElementById('dafter').value)||7;
  const dStart = new Date(cy,cm-1,cd-before);
  const dEnd   = new Date(cy,cm-1,cd+after);
  return { center, dStart, dEnd,
    author: document.getElementById('author').value||'Régis Sousa',
    client: document.getElementById('client').value||'' };
}

function generate() {
  if (!WB) return;
  const cfg = getCfg();

  const prevP = pastRows, prevF = futRows;
  pastRows = WB.past.filter(r => r.date >= cfg.dStart && r.date <= cfg.center);
  futRows  = WB.future.filter(r => r.date >= cfg.center && r.date <= cfg.dEnd);

  // Restaura obs
  [...prevP,...prevF].forEach(prev => {
    if (!prev.obs) return;
    [...pastRows,...futRows].forEach(cur => {
      if (cur.date.getTime()===prev.date.getTime() && cur.nome===prev.nome) cur.obs=prev.obs;
    });
  });

  buildPreview(cfg);
  document.getElementById('preview-section').style.display = 'block';
  setTimeout(()=>document.getElementById('preview-section').scrollIntoView({behavior:'smooth'}),80);
}

function buildPreview(cfg) {
  const isL = orient==='landscape';
  const wrap = document.getElementById('pwrap');
  wrap.innerHTML = '';
  const page = document.createElement('div');
  page.className = 'rpt' + (isL?'':' portrait');
  page.id = 'rpt-page';

  const perFmt = `${cfg.dStart.toLocaleDateString('pt-BR')} → ${cfg.dEnd.toLocaleDateString('pt-BR')}`;
  const pastTitle = `Agendamentos Passados · ${cfg.dStart.toLocaleDateString('pt-BR')} – ${cfg.center.toLocaleDateString('pt-BR')}`;
  const futTitle  = `Agendamentos Futuros · ${cfg.center.toLocaleDateString('pt-BR')} – ${cfg.dEnd.toLocaleDateString('pt-BR')}`;

  const hdrs = showSaldo
    ? ['Vencimento','Nome','Descrição','Entrada','Saída','Saldo']
    : ['Vencimento','Nome','Descrição','Entrada','Saída'];

  function tblHTML(rows) {
    const numCols = showSaldo ? [3,4,5] : [3,4];
    let h = `<table class="rpt-tbl"><thead><tr>`;
    hdrs.forEach((c,i) => h += `<th class="${numCols.includes(i)?'r':''}">${c}</th>`);
    h += `</tr></thead><tbody>`;
    if (!rows.length) {
      h += `<tr><td colspan="${hdrs.length}" style="text-align:center;color:#9ca3af;font-style:italic;padding:10px">Nenhum registro no período</td></tr>`;
    } else {
      rows.forEach((r,i) => {
        h += `<tr class="${i%2?'er':''}">`;
        h += `<td>${fmtD(r.venc)}</td>`;
        h += `<td style="font-weight:500">${r.nome}</td>`;
        h += `<td>${r.desc}</td>`;
        h += `<td class="r ${r.entrada?'gn':'ds'}">${r.entrada?fmtM(r.entrada):'—'}</td>`;
        h += `<td class="r ${r.saida?'rd':'ds'}">${r.saida?fmtM(Math.abs(r.saida)):'—'}</td>`;
        if (showSaldo) h += `<td class="r" style="color:#1A56FF">${r.saldo!=null?fmtM(r.saldo):'—'}</td>`;
        h += `</tr>`;
      });
    }
    h += `</tbody></table>`;
    return h;
  }

  const today = new Date();
  page.innerHTML = `
    <div class="rpt-head">
      <div style="height:18mm;display:flex;align-items:center;"><span style="color:#fff;font-size:1.4rem;font-weight:700;letter-spacing:0.05em;">TEMM</span></div>
      <div class="rpt-hr">
        <h1>Relatório Semanal</h1>
        <div class="cli">${cfg.client}</div>
        <div class="per">Período: ${perFmt}</div>
      </div>
    </div>
    <div class="rpt-body">
      <div class="rpt-sec"><div class="rpt-bar">${pastTitle}</div>${tblHTML(pastRows)}</div>
      <div class="rpt-sec"><div class="rpt-bar">${futTitle}</div>${tblHTML(futRows)}</div>
      <div class="rpt-obs">
        <div class="rpt-obs-lbl">Observações gerais</div>
        <textarea class="rpt-obs-area" id="obs-geral" rows="4"
          placeholder="Registre observações gerais aqui..."
          onchange="obsGeral=this.value" onblur="obsGeral=this.value">${obsGeral}</textarea>
      </div>
    </div>
    <div class="rpt-foot">Relatório gerado por ${cfg.author} — Temm Gestão | ${today.toLocaleDateString('pt-BR')}</div>`;

  wrap.appendChild(page);
}

  if (gaEl) obsGeral = gaEl.value;

  const cfg = getCfg();
  const isL = orient==='landscape';

        h += `<td class="r ${r.saida?'rd':'ds'}">${r.saida?fmtM(Math.abs(r.saida)):'—'}</td>`;
        if (showSaldo) h += `<td class="r" style="color:#1A56FF">${r.saldo!=null?fmtM(r.saldo):'—'}</td>`;
        h += `</tr>`;
      });
    }
    h += `</tbody></table>`;
    return h;
  }

  const today = new Date();
  const pw = isL?'297mm':'210mm', ph = isL?'210mm':'297mm';
  const docTitle = 'Fluxo de Caixa' + (cfg.client ? ' — ' + cfg.client : '');

  const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>${docTitle}</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@page{size:${pw} ${ph};margin:0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Sora',sans-serif;background:#fff;color:#1A1A2E;}

.rpt-hr{text-align:right;color:#fff;}

</style></head><body>
<div class="rpt-head">
  <div style="height:18mm;display:flex;align-items:center;"><span style="color:#fff;font-size:1.6rem;font-weight:700;letter-spacing:0.05em;">TEMM</span></div>
  <div class="rpt-hr"><h1>Relatório Semanal</h1><div class="cli">${cfg.client}</div><div class="per">Período: ${perFmt}</div></div>

  <div class="rpt-sec"><div class="rpt-bar">${pastTitle}</div>${pTbl(pastRows)}</div>
  <div class="rpt-sec"><div class="rpt-bar">${futTitle}</div>${pTbl(futRows)}</div>
  <div class="rpt-obs">
    <div class="rpt-obs-lbl">Observações gerais</div>
    <div class="rpt-obs-box">${(obsGeral||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
