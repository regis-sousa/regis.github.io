<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Honorários — Temm Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg:#0F1117; --card:#1C2033; --card2:#232740; --border:#2A2F45;
    --blue:#1A56FF; --teal:#00C9A7; --yellow:#D4C200;
    --text:#E8EAF0; --muted:#7B82A0; --red:#f87171; --green:#34d399;
    --accent:#1A56FF; --accent-light:rgba(26,86,255,.1); --accent-border:rgba(26,86,255,.3);
    --radius:10px;
  }


  .app-header{background:var(--blue);padding:14px 28px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--teal);position:sticky;top:0;z-index:100;}
  .app-header img{height:34px;flex-shrink:0;}
  .app-header h1{font-size:0.97rem;font-weight:700;color:#fff;}
  .app-header p{font-size:0.7rem;color:rgba(255,255,255,0.65);margin-top:2px;}
  .logo-link{display:flex;align-items:center;text-decoration:none;}
  .back-btn{margin-left:auto;padding:6px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:0.76rem;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .2s;}
  .back-btn:hover{background:rgba(255,255,255,0.2);}

/* Layout */
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;}
.layout{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 63px);}

/* Sidebar */
.sidebar{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-head{padding:1.1rem 1.1rem .7rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-head h2{font-size:0.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:0.73rem;cursor:pointer;font-family:'Sora',sans-serif;transition:opacity .15s;font-weight:600;}
.btn-add:hover{opacity:.85;}
.teachers-list{flex:1;overflow-y:auto;padding:.7rem;}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.8rem;}
.empty-icon{font-size:2rem;margin-bottom:.5rem;}
.t-card{background:var(--card2);border:1px solid var(--border);border-radius:9px;margin-bottom:7px;overflow:hidden;transition:border-color .15s;}
.t-card:hover{border-color:#3a4060;}
.t-card.active{border-color:var(--blue);background:rgba(26,86,255,.08);}
.t-card-body{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.t-name{font-weight:600;font-size:0.87rem;}
.t-rate{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.t-card.active .t-rate{color:var(--teal);}
.t-actions{display:flex;gap:5px;}
.t-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:0.68rem;cursor:pointer;color:var(--muted);font-family:'Sora',sans-serif;transition:all .15s;}
.t-btn:hover{border-color:var(--blue);color:#6fa3ff;background:rgba(26,86,255,.08);}
.t-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08);}
.t-edit-form{display:none;padding:9px 13px;border-top:1px solid var(--border);background:var(--bg);flex-direction:column;gap:6px;}
.t-edit-form.open{display:flex;}
.t-edit-form label{font-size:0.63rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
.t-edit-form input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:0.8rem;font-family:'DM Mono',monospace;background:#12151F;color:var(--text);outline:none;}
.t-edit-form input:focus{border-color:var(--blue);}
.ef-row{display:flex;gap:6px;margin-top:2px;}
.ef-save{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 13px;font-size:0.74rem;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600;}
.ef-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:0.74rem;cursor:pointer;font-family:'Sora',sans-serif;color:var(--muted);}
.add-form{background:rgba(212,194,0,.07);border:1px solid rgba(212,194,0,.25);border-radius:9px;padding:13px;margin-bottom:9px;display:none;flex-direction:column;gap:7px;}
.add-form.open{display:flex;}
.add-form label{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--yellow);margin-bottom:1px;}
.add-form input{width:100%;border:1px solid rgba(212,194,0,.3);border-radius:6px;padding:7px 9px;font-size:0.8rem;font-family:'DM Mono',monospace;background:#12151F;color:var(--text);outline:none;}

/* Sync status */
.sync-bar{padding:6px 13px;display:flex;align-items:center;gap:7px;font-size:0.7rem;border-top:1px solid var(--border);background:var(--bg);}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.loading{background:var(--yellow);animation:pulse .8s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Main area */
.main{padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:1.1rem;overflow-y:auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.35rem;}
.card-title{font-size:0.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:.9rem;}
.field-label{display:block;font-size:0.73rem;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.02em;}
.field{width:100%;border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:0.8rem;background:#12151F;color:var(--text);transition:border-color .15s;outline:none;}
.field:focus{border-color:var(--blue);}
textarea.field{min-height:185px;resize:vertical;line-height:1.7;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.hint-box{background:rgba(212,194,0,.07);border:1px solid rgba(212,194,0,.25);border-radius:9px;padding:9px 13px;font-size:0.78rem;color:var(--yellow);margin-bottom:.7rem;}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:0.86rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:opacity .15s;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:none;color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:10px 15px;font-size:0.86rem;cursor:pointer;font-family:'Sora',sans-serif;margin-left:8px;transition:all .15s;}
.btn-secondary:hover{border-color:var(--border);color:var(--text);}
.selected-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(26,86,255,.12);border:1px solid rgba(26,86,255,.3);border-radius:50px;padding:5px 13px;font-size:0.8rem;color:#6fa3ff;font-weight:600;margin-bottom:.7rem;}
.selected-badge button{background:none;border:none;cursor:pointer;color:#6fa3ff;font-size:17px;line-height:1;padding:0;}

/* Results */
.result-section{display:none;flex-direction:column;gap:1.1rem;}
.result-section.on{display:flex;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.mbox{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.mbox.blue{background:rgba(26,86,255,.08);border-color:rgba(26,86,255,.3);}
.mbox.green{background:rgba(0,201,167,.08);border-color:rgba(0,201,167,.3);}
.mlabel{font-size:0.63rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.mbox.blue .mlabel{color:#6fa3ff;}
.mbox.green .mlabel{color:var(--teal);}
.mval{font-size:1.35rem;font-weight:700;line-height:1;color:var(--text);}
.mbox.blue .mval{color:#6fa3ff;}
.mbox.green .mval{color:var(--teal);}
.msub{font-size:0.68rem;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
table.dtable{width:100%;border-collapse:collapse;font-size:0.8rem;}
table.dtable th{text-align:left;padding:7px 11px;font-size:0.63rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
table.dtable td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.dtable tr:last-child td{border-bottom:none;}
table.dtable tr.data-row:hover td{background:var(--card2);}
.day-sep-row td{background:var(--card2);font-size:0.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 11px;border-top:1px solid var(--border);}
.tag{display:inline-block;padding:2px 9px;border-radius:50px;font-size:0.69rem;font-weight:600;}
.ti{background:rgba(26,86,255,.12);color:#6fa3ff;border:1px solid rgba(26,86,255,.3);}
.tt{background:rgba(0,201,167,.1);color:var(--teal);border:1px solid rgba(0,201,167,.3);}
.mono{font-family:'DM Mono',monospace;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.87rem;}
.sum-row:last-child{border-bottom:none;font-weight:700;}
.sl{color:var(--muted);}
.sum-row:last-child .sl{color:var(--text);}
.vbox{border-radius:9px;padding:13px 16px;border:1px solid;display:flex;align-items:flex-start;gap:11px;}
.vbox.ok{background:rgba(0,201,167,.08);border-color:rgba(0,201,167,.3);}
.vbox.err{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);}
.vbox.warn{background:rgba(212,194,0,.07);border-color:rgba(212,194,0,.25);}
.vi{font-size:1.25rem;line-height:1.3;}
.vtitle{font-weight:700;font-size:0.87rem;margin-bottom:2px;}
.vbox.ok .vtitle{color:var(--teal);}
.vbox.err .vtitle{color:var(--red);}
.vbox.warn .vtitle{color:var(--yellow);}
.vdetail{font-size:0.8rem;color:var(--muted);}
.alert-warn{background:rgba(212,194,0,.07);border:1px solid rgba(212,194,0,.25);border-radius:9px;padding:8px 12px;font-size:0.8rem;color:var(--yellow);margin-bottom:5px;}

/* duration popup */
.dur-popup{position:absolute;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.35);padding:7px;display:flex;flex-direction:column;gap:3px;min-width:155px;}
.dur-opt{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:0.75rem;font-family:'Sora',sans-serif;cursor:pointer;text-align:left;color:var(--text);transition:all .12s;}
.dur-opt:hover{background:rgba(26,86,255,.1);border-color:var(--blue);color:#6fa3ff;}
.dur-custom-row{display:flex;gap:5px;margin-top:2px;}
.dur-custom-input{flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:0.74rem;font-family:'DM Mono',monospace;background:#12151F;color:var(--text);width:65px;outline:none;}
.dur-custom-input:focus{border-color:var(--blue);}
.dur-custom-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:0.68rem;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}
.btn-export{background:var(--teal);color:#0F1117;border:none;border-radius:9px;padding:10px 19px;font-size:0.86rem;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s;}
.btn-export:hover{opacity:.85;}

/* print */
#print-header{display:none;}
#pdf-footer{display:none;}
@media print{
  body{background:#fff!important;font-size:12px;color:#111;}
  .app-header,.sidebar,.card-input-area,.btn-export,.btn-primary,.btn-secondary,.no-print{display:none!important;}
  .layout{display:block;}
  .main{padding:0;}
  .result-section{display:flex!important;}
  .card{border:1px solid #ccc!important;border-radius:6px!important;margin-bottom:12px;break-inside:avoid;background:#fff!important;}
  .metrics-grid{grid-template-columns:repeat(4,1fr)!important;}
  .dtable td,.dtable th{padding:5px 8px!important;font-size:11px!important;}
  #print-header{display:block!important;padding-bottom:8px;border-bottom:2px solid #111;margin-bottom:12px;}
  #pdf-footer{display:block!important;}
  .mbox,.mbox.blue,.mbox.green{background:#f5f5f5!important;border:1px solid #ccc!important;}
  .mval,.mbox.blue .mval,.mbox.green .mval{color:#111!important;}
}
</style>
</head>

  <div class="sidebar">
    <div class="sidebar-head">
      <h2>Professoras</h2>

    <div class="teachers-list" id="teachers-list-wrap">
      <div class="add-form" id="add-form">

<script>

/* ════════════════════════════════════════════
   ⚙️  CONFIGURAÇÃO — troque pela sua URL
   ════════════════════════════════════════════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6m7PBujp_O_FYVGSsxa051cdAVAuk0M_QSm2Z7eda15N2CYhbjOSecV8P_VvCe7Su/exec';

/* ── API helpers ── */
async function apiGet(action) {
  const url = SCRIPT_URL + '?action=' + action + '&t=' + Date.now();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

/* ── SYNC STATUS ── */
function setSyncStatus(status, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-msg');
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
}

/* ── STATE ── */
let teachers = [];
let selectedId = null;
let addOpen = false;

/* ── CARREGAR PROFESSORAS DO SHEETS ── */
async function loadTeachers() {
  setSyncStatus('loading', 'Carregando...');
  try {
    const data = await apiGet('getAll');
    if (data.error) throw new Error(data.error);
    teachers = data.teachers || [];
    teachers.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
    setSyncStatus('ok', 'Sincronizado ✓');
    renderSidebar();
  } catch (e) {
    setSyncStatus('err', 'Erro ao conectar');
    // fallback: tenta localStorage como cache
    const cached = localStorage.getItem('calc_teachers_cache');
    if (cached) {
      teachers = JSON.parse(cached);
      teachers.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
      renderSidebar();
      setSyncStatus('err', 'Offline — dados em cache');
    }
    console.error(e);
  }
}

/* ── CACHE LOCAL (fallback offline) ── */
function updateCache() {
  localStorage.setItem('calc_teachers_cache', JSON.stringify(teachers));
}

/* ── TEACHER CRUD ── */
function toggleAdd() {
  addOpen = !addOpen;
  document.getElementById('add-form').classList.toggle('open', addOpen);
  if (addOpen) setTimeout(() => document.getElementById('new-name').focus(), 50);
}

async function addTeacher() {
  const name = document.getElementById('new-name').value.trim();
  const rate = parseFloat(document.getElementById('new-rate').value);
  if (!name) { alert('Informe o nome.'); return; }
  if (isNaN(rate) || rate <= 0) { alert('Informe um valor/hora válido.'); return; }

  const teacher = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2),
    name,
    rate
  };

  setSyncStatus('loading', 'Salvando...');
  try {
    const res = await apiPost({ action: 'save', teacher });
    if (res.error) throw new Error(res.error);
    teachers.push(teacher);
    teachers.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
    updateCache();
    setSyncStatus('ok', 'Salvo ✓');
  } catch (e) {
    setSyncStatus('err', 'Erro ao salvar');
    alert('Erro ao salvar no Google Sheets. Verifique a conexão.');
    console.error(e);
    return;
  }

  document.getElementById('new-name').value = '';
  document.getElementById('new-rate').value = '';
  toggleAdd();
  renderSidebar();
}

async function deleteTeacher(id) {
  if (!confirm('Excluir esta professora?')) return;

  setSyncStatus('loading', 'Excluindo...');
  try {
    const res = await apiPost({ action: 'delete', id });
    if (res.error) throw new Error(res.error);
    teachers = teachers.filter(t => t.id !== id);
    if (selectedId === id) clearSel();
    updateCache();
    setSyncStatus('ok', 'Excluído ✓');
    renderSidebar();
  } catch (e) {
    setSyncStatus('err', 'Erro ao excluir');
    alert('Erro ao excluir. Verifique a conexão.');
    console.error(e);
  }
}

function openEdit(id) {
  document.querySelectorAll('.t-edit-form').forEach(f => f.classList.remove('open'));
  const f = document.getElementById('ef-' + id);
  if (f) { f.classList.add('open'); f.querySelector('input').focus(); }
}
function closeEdit(id) {
  const f = document.getElementById('ef-' + id);
  if (f) f.classList.remove('open');
}

async function saveEdit(id) {
  const t = teachers.find(x => x.id === id);
  if (!t) return;
  const name = document.getElementById('ef-name-' + id).value.trim();
  const rate = parseFloat(document.getElementById('ef-rate-' + id).value);
  if (!name || isNaN(rate) || rate <= 0) { alert('Preencha os campos corretamente.'); return; }

  const updated = { id, name, rate };
  setSyncStatus('loading', 'Salvando...');
  try {
    const res = await apiPost({ action: 'save', teacher: updated });
    if (res.error) throw new Error(res.error);
    t.name = name; t.rate = rate;
    teachers.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
    updateCache();
    setSyncStatus('ok', 'Salvo ✓');
  } catch (e) {
    setSyncStatus('err', 'Erro ao salvar');
    alert('Erro ao salvar. Verifique a conexão.');
    console.error(e);
    return;
  }

  if (selectedId === id) {
    document.getElementById('rate-input').value = rate.toFixed(2);
    document.getElementById('sel-label').textContent = name + ' · R$ ' + fmtN(rate) + '/h';
  }
  closeEdit(id);
  renderSidebar();
}

function selectTeacher(id) {
  selectedId = id;
  const t = teachers.find(x => x.id === id);
  if (!t) return;
  document.getElementById('rate-input').value = t.rate.toFixed(2);

  // cria badge se não existir
  let badge = document.getElementById('sel-badge-area');
  if (!badge) {
    const area = document.getElementById('selected-teacher-area');
    area.innerHTML = `
      <div id="sel-badge-area" style="margin-bottom:.7rem;">
        <div class="selected-badge">
          <span id="sel-label"></span>
          <button onclick="clearSel()" title="Limpar seleção">×</button>
        </div>
      </div>
      <div id="no-sel-hint" style="display:none"></div>`;
  }
  document.getElementById('sel-label').textContent = t.name + ' · R$ ' + fmtN(t.rate) + '/h';
  document.getElementById('sel-badge-area').style.display = '';
  const hint = document.getElementById('no-sel-hint');
  if (hint) hint.style.display = 'none';
  document.getElementById('no-sel-msg').style.display = 'none';
  renderSidebar();
}

function clearSel() {
  selectedId = null;
  document.getElementById('rate-input').value = '';
  const badge = document.getElementById('sel-badge-area');
  if (badge) badge.style.display = 'none';
  document.getElementById('no-sel-msg').style.display = '';
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('teachers-list');
  if (!teachers.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128105;&#8205;&#127979;</div><p>Nenhuma professora cadastrada.<br>Clique em <strong>+ Adicionar</strong> para começar.</p></div>';
    return;
  }
  list.innerHTML = teachers.map(t => `
    <div class="t-card${selectedId === t.id ? ' active' : ''}">
      <div class="t-card-body" onclick="selectTeacher('${t.id}')">
        <div>
          <div class="t-name">${esc(t.name)}</div>
          <div class="t-rate">R$ ${fmtN(t.rate)} / hora</div>
        </div>
        <div class="t-actions" onclick="event.stopPropagation()">
          <button class="t-btn" onclick="openEdit('${t.id}')">editar</button>
          <button class="t-btn del" onclick="deleteTeacher('${t.id}')">excluir</button>
        </div>
      </div>
      <div class="t-edit-form" id="ef-${t.id}">
        <div><label>Nome</label><input type="text" id="ef-name-${t.id}" value="${esc(t.name)}"></div>
        <div><label>Valor / hora (R$)</label><input type="number" id="ef-rate-${t.id}" value="${t.rate}" step="0.01" min="0"></div>
        <div class="ef-row">
          <button class="ef-save" onclick="saveEdit('${t.id}')">Salvar</button>
          <button class="ef-cancel" onclick="closeEdit('${t.id}')">Cancelar</button>
        </div>
      </div>
    </div>`).join('');
}

/* ── DURATION PARSER ── */
function parseDuration(raw) {
  if (/\(0[,.]5\)|\(½\)|½/.test(raw)) return 0.5;
  const horarioPatterns = [
    /\|\s*[^|]*às\s+\d{1,2}h\b/gi,
    /às\s+\d{1,2}(?::\d{2})?\s*h?\b/gi,
    /\b(?:segunda|terça|terca|quarta|quinta|sexta|sábado|sabado|domingo|seg|ter|qua|qui|sex|sab|dom)\s+(?:às\s+)?\d{1,2}h\b/gi,
    /\b\d{1,2}:\d{2}\b/g,
    /\b([6-9]|1\d|2[0-3])h\b/g,
  ];
  let cleaned = raw;
  horarioPatterns.forEach(p => { cleaned = cleaned.replace(p, ' '); });
  const m = cleaned.match(/\b(\d(?:[,.]5)?)\s*h\b/i);
  if (m) {
    const n = parseFloat(m[1].replace(',', '.'));
    if (n > 0 && n <= 5) return n;
  }
  return 1;
}

/* ── CLASSIFIER ── */
const TURMA_KW = ['básico','basico','intermediário','intermediario','avançado','avancado',
  'iniciante','pré-int','pre-int','pré int','pre int','upper','elementary','beginner',
  'false beginners','turma','nível','nivel','anual'];
const ACTIVITY_PREFIX = /^(?:conversa[çc][aã]o|conversation|aula|reforço|reforco|preparação|preparacao|experimental|subs?|reposição|reposicao|viagens?)\s*(?:\bI{1,3}\b|\bII\b|\b[12]\b)?\s*/i;

function isPersonName(text) {
  const t = text.replace(/\(.*?\)/g,'').trim();
  if (!t || t.length < 2) return false;
  const lower = t.toLowerCase();
  if (TURMA_KW.some(k => lower.includes(k))) return false;
  if (/\d/.test(t)) return false;
  const words = t.split(/\s+/).filter(Boolean);
  if (words.length < 1 || words.length > 4) return false;
  return words.every(w => /^[A-ZÁÉÍÓÚÀÂÊÎÔÛÃÕÇ]/.test(w));
}

function classify(raw) {
  const segments = raw.split('|').map(s => s.replace(/\(.*?\)/g,'').trim()).filter(Boolean);
  const fullText = segments.join(' ');
  const fullLower = fullText.toLowerCase();
  if (/\bindividual\b/.test(fullLower)) return 'individual';
  if (TURMA_KW.some(k => fullLower.includes(k))) return 'turma';
  if (/\d/.test(fullText) && /[a-záéíóúàâêîôûãõç]/i.test(fullText)) return 'turma';
  for (const seg of segments) {
    const withoutPrefix = seg.replace(ACTIVITY_PREFIX, '').trim();
    if (isPersonName(withoutPrefix)) return 'individual';
    if (isPersonName(seg)) return 'individual';
  }
  const first = segments[0] || '';
  if (/^subs?\s+/i.test(first)) {
    const after = first.replace(/^subs?\s+/i,'');
    return (TURMA_KW.some(k => after.toLowerCase().includes(k)) || /\d/.test(after)) ? 'turma' : 'individual';
  }
  if (/^reposi[çc][aã]o\s+/i.test(first)) {
    const after = first.replace(/^reposi[çc][aã]o\s+/i,'');
    return (TURMA_KW.some(k => after.toLowerCase().includes(k)) || /\d/.test(after)) ? 'turma' : 'individual';
  }
  if (/^experimental\s+/i.test(first)) {
    const after = first.replace(/^experimental\s+/i,'').trim();
    return TURMA_KW.some(k => after.toLowerCase().includes(k)) ? 'turma' : 'individual';
  }
  if (/^viagens?/i.test(first)) {
    const after = first.replace(/^viagens?\s*/i,'').trim();
    return (!after || TURMA_KW.some(k => after.toLowerCase().includes(k))) ? 'turma' : 'individual';
  }
  const suffix = first.replace(ACTIVITY_PREFIX, '').trim();
  if (!suffix || suffix.length < 2) return 'turma';
  return 'turma';
}

/* ── GLOBAL LESSONS STATE ── */
let lessons = [];
let currentRate = 0;
let currentDeclared = NaN;
let currentTeacherName = 'Professora';

/* ── TYPE EDIT (double-click) ── */
function editType(idx) {
  const cell = document.getElementById('type-cell-' + idx);
  if (!cell) return;
  const l = lessons[idx];
  cell.innerHTML = `
    <select id="type-sel-${idx}" style="font-family:'DM Sans',sans-serif;font-size:12px;border:1px solid var(--accent-border);border-radius:6px;padding:2px 6px;background:var(--accent-light);color:var(--accent);cursor:pointer">
      <option value="individual" ${l.type==='individual'?'selected':''}>Individual</option>
      <option value="turma" ${l.type==='turma'?'selected':''}>Turma</option>
    </select>`;
  const sel = document.getElementById('type-sel-' + idx);
  sel.focus();
  sel.addEventListener('change', () => {
    lessons[idx].type = sel.value;
    lessons[idx].value = lessons[idx].duration * currentRate;
    renderResults();
  });
  sel.addEventListener('blur', () => renderTypeCell(idx));
}

function renderTypeCell(idx) {
  const cell = document.getElementById('type-cell-' + idx);
  if (!cell) return;
  const l = lessons[idx];
  cell.innerHTML = `<span class="tag ${l.type==='individual'?'ti':'tt'}" style="cursor:pointer" title="Duplo clique para editar">${l.type==='individual'?'Individual':'Turma'}</span>`;
}

function renderResults() {
  const rate = currentRate;
  const declared = currentDeclared;

  const totalH = lessons.reduce((s,l) => s + l.duration, 0);
  const indiv  = lessons.filter(l => l.type === 'individual');
  const turma  = lessons.filter(l => l.type === 'turma');
  const indivH = indiv.reduce((s,l) => s + l.duration, 0);
  const turmaH = turma.reduce((s,l) => s + l.duration, 0);
  const indivV = indiv.reduce((s,l) => s + l.value, 0);
  const turmaV = turma.reduce((s,l) => s + l.value, 0);
  const totalV = indivV + turmaV;

  document.getElementById('metrics-grid').innerHTML = `
    <div class="mbox">
      <div class="mlabel">Total de Horas</div>
      <div class="mval">${fmtHours(totalH)}</div>
      <div class="msub">${lessons.length} aulas</div>
    </div>
    <div class="mbox blue">
      <div class="mlabel">Individuais</div>
      <div class="mval">${fmtHours(indivH)}</div>
      <div class="msub">${indiv.length} aulas · ${fmtR(indivV)}</div>
    </div>
    <div class="mbox green">
      <div class="mlabel">Turmas</div>
      <div class="mval">${fmtHours(turmaH)}</div>
      <div class="msub">${turma.length} aulas · ${fmtR(turmaV)}</div>
    </div>
    <div class="mbox">
      <div class="mlabel">Valor Total</div>
      <div class="mval" style="font-size:20px">${fmtR(totalV)}</div>
      <div class="msub">${fmtHours(totalH)} × R$ ${fmtN(rate)}/h</div>
    </div>`;

  let tbodyHtml = '';
  let lastDay = null;
  let accumulated = 0;
  lessons.forEach((l, idx) => {
    accumulated += l.duration;
    if (l.day && l.day !== lastDay) {
      tbodyHtml += '<tr class="day-sep-row"><td colspan="6">' + l.day + '</td></tr>';
      lastDay = l.day;
    }
    tbodyHtml += `<tr class="data-row">
      <td class="mono" style="color:var(--muted)">${l.num}</td>
      <td>${esc(l.cleanName)}</td>
      <td id="type-cell-${idx}" ondblclick="editType(${idx})" style="cursor:pointer"><span class="tag ${l.type==='individual'?'ti':'tt'}" title="Duplo clique para editar">${l.type==='individual'?'Individual':'Turma'}</span></td>
      <td id="dur-cell-${idx}" ondblclick="editDuration(${idx})" style="cursor:pointer"><span class="mono" title="Duplo clique para editar">${fmtHours(l.duration)}</span></td>
      <td class="mono" style="color:var(--muted)">${fmtHours(accumulated)}</td>
      <td class="mono">${fmtR(l.value)}</td>
    </tr>`;
  });
  document.getElementById('detail-tbody').innerHTML = tbodyHtml;

  document.getElementById('summary-area').innerHTML = `
    <div class="sum-row">
      <span class="sl">Individuais (${indiv.length} aulas)</span>
      <span class="mono">${fmtHours(indivH)} × R$&nbsp;${fmtN(rate)} = ${fmtR(indivV)}</span>
    </div>
    <div class="sum-row">
      <span class="sl">Turmas (${turma.length} aulas)</span>
      <span class="mono">${fmtHours(turmaH)} × R$&nbsp;${fmtN(rate)} = ${fmtR(turmaV)}</span>
    </div>
    <div class="sum-row">
      <span class="sl">Total geral</span>
      <span class="mono">${fmtHours(totalH)} = ${fmtR(totalV)}</span>
    </div>`;

  const va = document.getElementById('validation-area');
  if (!isNaN(declared) && declared > 0) {
    const diff = Math.abs(declared - totalV);
    if (diff < 0.02) {
      va.innerHTML = `<div class="vbox ok"><div class="vi">✓</div><div><div class="vtitle">Valor confere</div><div class="vdetail">Informado ${fmtR(declared)} = calculado ${fmtR(totalV)}</div></div></div>`;
    } else {
      const label = declared > totalV ? 'a mais' : 'a menos';
      const aulasExtra = declared > totalV ? Math.ceil((declared - totalV) / rate) : 0;
      const aulasMenos = declared < totalV ? Math.ceil((totalV - declared) / rate) : 0;
      const meiaExtra  = declared > totalV ? Math.ceil((declared - totalV) / (rate * 0.5)) : 0;
      const meiaMenos  = declared < totalV ? Math.ceil((totalV - declared) / (rate * 0.5)) : 0;
      const rateNeeded = totalH > 0 ? declared / totalH : 0;
      const diffH = diff / rate;
      let sugs = '<br><strong style="display:block;margin-top:8px;margin-bottom:4px">Sugestões para bater o valor:</strong><ul style="margin:0;padding-left:18px;line-height:1.8">';
      if (declared > totalV) {
        sugs += '<li>Faltam <strong>' + aulasExtra + ' aula(s) de 1h</strong> ou <strong>' + meiaExtra + ' aula(s) de 30min</strong> (≈ ' + fmtHours(diffH) + ' a mais)</li>';
        sugs += '<li>Ou o valor/hora seria <strong>' + fmtR(rateNeeded) + '/h</strong> em vez de ' + fmtR(rate) + '/h</li>';
      } else {
        sugs += '<li>Há <strong>' + aulasMenos + ' aula(s) de 1h</strong> ou <strong>' + meiaMenos + ' aula(s) de 30min</strong> a mais (≈ ' + fmtHours(diffH) + ' excedente)</li>';
        sugs += '<li>Ou o valor/hora seria <strong>' + fmtR(rateNeeded) + '/h</strong> em vez de ' + fmtR(rate) + '/h</li>';
      }
      sugs += '</ul>';
      va.innerHTML = '<div class="vbox err"><div class="vi">✗</div><div><div class="vtitle">Divergência de ' + fmtR(diff) + ' ' + label + '</div><div class="vdetail">Professora informou ' + fmtR(declared) + ', calculado ' + fmtR(totalV) + '.' + sugs + '</div></div></div>';
    }
  } else {
    va.innerHTML = `<div class="vbox warn"><div class="vi">—</div><div><div class="vtitle">Sem valor para comparar</div><div class="vdetail">Preencha "Valor informado pela professora" para habilitar a comparação.</div></div></div>`;
  }
}

/* ── PARSER ── */
const DAY_NAMES = ['SEGUNDA','TERÇA','TERCA','QUARTA','QUINTA','SEXTA','SÁBADO','SABADO','DOMINGO'];
const DAY_RE_START = new RegExp('^\\s*(' + DAY_NAMES.join('|') + ')\\s*[:\\-]?\\s*$', 'i');

function normDay(d) {
  d = d.toUpperCase().trim();
  if (d === 'TERCA') return 'TERÇA';
  if (d === 'SABADO') return 'SÁBADO';
  return d;
}
function isDayLine(line) { return DAY_RE_START.test(line.trim()); }
function stripLeadingNumber(line) { return line.replace(/^\d+[.)\-\s]\s*/, '').trim(); }
const JUNK_RE = /^(aulas\s+da\s+semana|total\s+de\s+aulas|total|aulas)[\s:=\-]*[\d,\.]*$/i;
function isJunkLine(line) { return JUNK_RE.test(line.trim()) || /^\s*$/.test(line); }

function parseAllFormats(rawText) {
  const lines = rawText.replace(/\r/g, '').split('\n');
  const result = [];
  let currentDay = '';
  let autoNum = 1;
  for (let raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (isJunkLine(line)) continue;
    if (isDayLine(line)) {
      const m = line.match(new RegExp('(' + DAY_NAMES.join('|') + ')', 'i'));
      if (m) currentDay = normDay(m[1]);
      continue;
    }
    const content = stripLeadingNumber(line);
    if (!content) continue;
    result.push({ num: autoNum++, content, day: currentDay });
  }
  return result;
}

/* ── MAIN CALC ── */
function calcular() {
  const rawText = document.getElementById('aulas-input').value.trim();
  if (!rawText) { alert('Cole a lista de aulas.'); return; }
  let rate = parseFloat(document.getElementById('rate-input').value);
  if (isNaN(rate) || rate <= 0) { alert('Informe o valor por hora (R$) da professora.'); return; }
  const teacher = selectedId ? teachers.find(t => t.id === selectedId) : null;
  const teacherName = teacher ? teacher.name : 'Professora';
  const declaredRaw = document.getElementById('declared-input').value.replace(',','.');
  const declared = declaredRaw ? parseFloat(declaredRaw) : NaN;
  const parsed = parseAllFormats(rawText);
  lessons = [];
  for (const { num, content, day } of parsed) {
    if (!content.trim()) continue;
    const duration = parseDuration(content);
    const type = classify(content);
    const value = duration * rate;
    const cleanName = content.replace(/\(0[,.]5\)/g,'').replace(/\(½\)/g,'').trim()
      .replace(/\s*\|\s*/g,' · ').replace(/\s{2,}/g,' ').trim();
    lessons.push({ num, cleanName, day: day || '', type, duration, value });
  }
  if (!lessons.length) { alert('Nenhuma aula encontrada. Verifique o formato.'); return; }
  currentRate = rate;
  currentDeclared = declared;
  currentTeacherName = teacherName;
  document.getElementById('res-name').textContent = teacherName;
  document.getElementById('res-rate-badge').textContent = 'R$ ' + fmtN(rate) + ' / hora';
  document.getElementById('alerts-area').innerHTML = '';
  renderResults();
  document.getElementById('result-section').classList.add('on');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function limpar() {
  document.getElementById('aulas-input').value = '';
  document.getElementById('declared-input').value = '';
  document.getElementById('result-section').classList.remove('on');
  document.getElementById('alerts-area').innerHTML = '';
}

/* ── UTILS ── */
function fmtN(n) { return n.toFixed(2).replace('.',','); }
function fmtR(n) { return 'R$\u00a0' + n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtHours(n) {
  const mins = Math.round(n * 60);
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (m === 0) return h + 'h';
  if (h === 0) return m + 'min';
  return h + 'h\u00a0' + m + 'min';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── DURATION EDIT ── */
let _durPopup = null;
function closeDurPopup() { if (_durPopup) { _durPopup.remove(); _durPopup = null; } }

function editDuration(idx) {
  closeDurPopup();
  const cell = document.getElementById('dur-cell-' + idx);
  if (!cell) return;
  const l = lessons[idx];
  const options = [
    { label: '30 minutos', value: 0.5 },
    { label: '1 hora',     value: 1   },
    { label: '1h 30min',   value: 1.5 },
    { label: '2 horas',    value: 2   },
  ];
  const popup = document.createElement('div');
  popup.className = 'dur-popup';
  popup.innerHTML = options.map(o =>
    `<button class="dur-opt" data-val="${o.value}">${o.label}${l.duration===o.value?' ✓':''}</button>`
  ).join('') +
  `<div class="dur-custom-row">
    <input class="dur-custom-input" id="dur-inp-${idx}" type="number" min="0.25" max="8" step="0.25" placeholder="Ex: 1.5" value="${l.duration}">
    <button class="dur-custom-btn" onclick="applyCustomDur(${idx})">OK</button>
  </div>`;
  const rect = cell.getBoundingClientRect();
  popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popup.style.left = (rect.left + window.scrollX) + 'px';
  document.body.appendChild(popup);
  _durPopup = popup;
  popup.querySelectorAll('.dur-opt').forEach(btn => {
    btn.addEventListener('click', () => applyDur(idx, parseFloat(btn.dataset.val)));
  });
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target)) { closeDurPopup(); document.removeEventListener('click', handler); }
    });
  }, 50);
}

function applyDur(idx, val) {
  if (!val || val <= 0) return;
  lessons[idx].duration = val;
  lessons[idx].value = val * currentRate;
  closeDurPopup();
  renderResults();
}

function applyCustomDur(idx) {
  const inp = document.getElementById('dur-inp-' + idx);
  const val = parseFloat(inp.value.replace(',','.'));
  if (isNaN(val) || val <= 0) { inp.focus(); return; }
  applyDur(idx, val);
}

/* ── EXPORT PDF ── */
function exportarPDF() {
  const teacherName = currentTeacherName || 'Professora';
  const ph = document.getElementById('print-header');
  document.getElementById('print-title').textContent = 'Relatório de Aulas — ' + teacherName;
  const now = new Date();
  document.getElementById('print-subtitle').textContent =
    'Gerado em ' + now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) +
    ' · ' + document.getElementById('res-rate-badge').textContent;
  ph.style.display = 'block';
  const oldTitle = document.title;
  document.title = 'Relatorio_' + teacherName.replace(/\s+/g,'_');
  window.print();
  document.title = oldTitle;
  ph.style.display = 'none';
}
